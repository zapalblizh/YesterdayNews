[build]
  command = "npm run build"
  publish = "_site"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

[dev]
  command = "npm run start"
  targetPort = 8080
  port = 8888

# Images change daily with each build
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# JS/CSS — long cache, Netlify CDN invalidates on deploy
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML — always revalidate
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"